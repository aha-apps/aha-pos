<template id="template-corte">
  <div x-data="window.Corte" class="space-y-6">

    <!-- NO OPEN CORTE: Big CTA -->
    <template x-if="!corteActual">
      <div class="flex flex-col items-center justify-center py-16">
        <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-6">
          <i class="bi bi-cash-stack text-4xl text-primary"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">Corte de Caja</h2>
        <p class="text-base-content/50 text-sm mb-8 text-center max-w-sm">
          No hay ning&uacute;n corte abierto. Inicia un nuevo turno para registrar las ventas del d&iacute;a.
        </p>
        <button class="btn btn-primary btn-lg btn-spring gap-2 px-10" @click="abrirCorte()">
          <i class="bi bi-play-circle-fill text-lg"></i>
          Abrir Corte
        </button>
      </div>
    </template>

    <!-- OPEN CORTE: Dashboard -->
    <template x-if="corteActual && !enArqueo">
      <div>
        <!-- Header -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-6">
          <div>
            <h2 class="text-xl font-bold">Corte Abierto</h2>
            <p class="text-sm text-base-content/50 mt-1">
              <span x-text="corteActual.folio"></span> &middot;
              Abierto: <span x-text="UI.formatDate(corteActual.apertura)"></span>
            </p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm gap-1.5" @click="imprimirTicket()">
              <i class="bi bi-printer"></i> Ticket
            </button>
            <button class="btn btn-primary btn-sm gap-1.5" @click="iniciarArqueo()">
              <i class="bi bi-calculator"></i> Iniciar Arqueo
            </button>
          </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="card-ds p-4">
            <div class="kpi-label">Ventas Hoy</div>
            <div class="kpi-value text-primary mt-1" x-text="ventasHoy.length"></div>
            <div class="text-xs text-base-content/50 mt-1" x-text="UI.formatCurrency(ventasHoy.reduce(function(s,v){return s+(v.total||0)},0))"></div>
          </div>
          <div class="card-ds p-4">
            <div class="kpi-label">Gastos</div>
            <div class="kpi-value text-warning mt-1" x-text="gastos.length"></div>
            <div class="text-xs text-base-content/50 mt-1" x-text="UI.formatCurrency(gastos.reduce(function(s,g){return s+(g.monto||0)},0))"></div>
          </div>
          <div class="card-ds p-4">
            <div class="kpi-label">Total Esperado</div>
            <div class="kpi-value text-secondary mt-1" x-text="UI.formatCurrency(totalEsperado)"></div>
            <div class="text-xs text-base-content/50 mt-1">Ventas - Gastos</div>
          </div>
          <div class="card-ds p-4">
            <div class="kpi-label">Transacciones</div>
            <div class="kpi-value mt-1" x-text="ventasHoy.length + gastos.length"></div>
            <div class="text-xs text-base-content/50 mt-1">Ventas + Gastos</div>
          </div>
        </div>

        <!-- Gastos Menores -->
        <div class="card-ds p-5 mb-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold">Gastos Menores</h3>
            <button class="btn btn-ghost btn-sm gap-1.5" @click="agregarGasto()">
              <i class="bi bi-plus-lg"></i> Agregar
            </button>
          </div>
          <template x-if="gastos.length === 0">
            <div class="text-center py-6 text-base-content/40 text-sm">
              <i class="bi bi-receipt text-2xl block mb-2"></i>
              No hay gastos registrados en este corte
            </div>
          </template>
          <template x-if="gastos.length > 0">
            <div class="overflow-x-auto">
              <table class="table table-sm">
                <thead>
                  <tr>
                    <th>Concepto</th>
                    <th class="text-right">Monto</th>
                    <th class="text-right">Hora</th>
                    <th class="w-10"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="g in gastos" :key="g.id">
                    <tr>
                      <td class="text-sm font-medium" x-text="g.concepto"></td>
                      <td class="text-sm text-right" x-text="UI.formatCurrency(g.monto)"></td>
                      <td class="text-sm text-right text-base-content/50" x-text="new Date(g.hora || g.createdAt).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})"></td>
                      <td class="text-right">
                        <button class="btn btn-ghost btn-xs btn-square text-error" @click="eliminarGasto(g.id)">
                          <i class="bi bi-trash3"></i>
                        </button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
          <div class="flex justify-between items-center mt-3 pt-3 border-t border-base-200">
            <span class="text-sm font-medium">Total Gastos</span>
            <span class="font-bold text-warning" x-text="UI.formatCurrency(gastos.reduce(function(s,g){return s+(g.monto||0)},0))"></span>
          </div>
        </div>

        <!-- Historial de Corte -->
        <template x-if="cortes.length > 0">
          <div class="card-ds p-5">
            <h3 class="font-semibold mb-4">&Uacute;ltimos Cortes</h3>
            <div class="overflow-x-auto">
              <table class="table table-sm">
                <thead>
                  <tr>
                    <th>Folio</th>
                    <th>Apertura</th>
                    <th>Cierre</th>
                    <th class="text-right">Esperado</th>
                    <th class="text-right">Real</th>
                    <th class="text-right">Diferencia</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="c in cortes.slice(0, 10)" :key="c.id">
                    <tr>
                      <td class="text-sm font-medium" x-text="c.folio || '—'"></td>
                      <td class="text-sm text-base-content/50" x-text="UI.formatDate(c.apertura)"></td>
                      <td class="text-sm text-base-content/50" x-text="c.cierre ? UI.formatDate(c.cierre) : '—'"></td>
                      <td class="text-sm text-right" x-text="UI.formatCurrency(c.totalEsperado)"></td>
                      <td class="text-sm text-right" x-text="UI.formatCurrency(c.totalReal)"></td>
                      <td class="text-sm text-right" :class="(c.totalReal - c.totalEsperado) >= 0 ? 'text-success' : 'text-error'" x-text="UI.formatCurrency(c.totalReal - c.totalEsperado)"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- ARQUEO: Denomination Counting -->
    <template x-if="corteActual && enArqueo && !arqueoCompletado">
      <div>
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold">Arqueo de Caja</h2>
            <p class="text-sm text-base-content/50 mt-1">
              Cuenta el efectivo en caja registrando la cantidad de cada denominaci&oacute;n
            </p>
          </div>
          <button class="btn btn-ghost btn-sm" @click="cancelarArqueo()">
            <i class="bi bi-x-lg"></i> Cancelar
          </button>
        </div>

        <div class="card-ds p-5 mb-6">
          <div class="space-y-2">
            <template x-for="(den, idx) in denominaciones" :key="idx">
              <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-base-200/50 transition-colors">
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-medium" x-text="den.nombre"></div>
                </div>
                <div class="flex items-center gap-2">
                  <button class="btn btn-ghost btn-xs btn-square" @click="actualizarDenominacion(idx, den.cantidad - 1)">
                    <i class="bi bi-dash"></i>
                  </button>
                  <input type="number" class="input input-bordered input-sm w-20 text-center"
                    :value="den.cantidad"
                    @input.debounce="actualizarDenominacion(idx, $event.target.value)"
                    min="0" step="1">
                  <button class="btn btn-ghost btn-xs btn-square" @click="actualizarDenominacion(idx, den.cantidad + 1)">
                    <i class="bi bi-plus"></i>
                  </button>
                </div>
                <div class="text-sm font-bold text-right w-24" x-text="UI.formatCurrency(den.valor * den.cantidad)"></div>
              </div>
            </template>
          </div>
        </div>

        <!-- Running Total -->
        <div class="card-ds p-5 mb-6">
          <div class="flex justify-between items-center">
            <span class="font-semibold">Total Contado</span>
            <span class="text-2xl font-bold text-primary" x-text="UI.formatCurrency(totalReal)"></span>
          </div>
          <div class="flex justify-between items-center mt-2">
            <span class="text-sm text-base-content/50">Total Esperado</span>
            <span class="text-lg font-semibold" x-text="UI.formatCurrency(totalEsperado)"></span>
          </div>
          <div class="flex justify-between items-center mt-2 pt-2 border-t border-base-200">
            <span class="text-sm font-medium">Diferencia</span>
            <span class="text-lg font-bold" :class="(totalReal - totalEsperado) >= 0 ? 'text-success' : 'text-error'"
              x-text="UI.formatCurrency(totalReal - totalEsperado)"></span>
          </div>
        </div>

        <div class="flex justify-center">
          <button class="btn btn-primary btn-lg btn-spring gap-2 px-10" @click="confirmarArqueo()">
            <i class="bi bi-check-circle-fill"></i> Confirmar Arqueo
          </button>
        </div>
      </div>
    </template>

    <!-- ARQUEO COMPLETADO: Summary + Close -->
    <template x-if="corteActual && arqueoCompletado">
      <div>
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold">Arqueo Completado</h2>
            <p class="text-sm text-base-content/50 mt-1">Revisa el resumen antes de cerrar el corte</p>
          </div>
          <button class="btn btn-ghost btn-sm" @click="cancelarArqueo()">
            <i class="bi bi-pencil"></i> Corregir
          </button>
        </div>

        <div class="card-ds p-5 mb-6">
          <!-- Denomination detail -->
          <div class="space-y-1 mb-4">
            <template x-for="den in denominaciones" :key="den.nombre">
              <template x-if="den.cantidad > 0">
                <div class="flex justify-between text-sm py-1">
                  <span class="text-base-content/60" x-text="den.cantidad + ' x ' + den.nombre"></span>
                  <span class="font-medium" x-text="UI.formatCurrency(den.valor * den.cantidad)"></span>
                </div>
              </template>
            </template>
          </div>

          <div class="space-y-3 pt-3 border-t border-base-200">
            <div class="flex justify-between items-center">
              <span class="text-base-content/60">Total Ventas</span>
              <span class="font-medium" x-text="UI.formatCurrency(ventasHoy.reduce(function(s,v){return s+(v.total||0)},0))"></span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-base-content/60">Total Gastos</span>
              <span class="font-medium text-warning" x-text="UI.formatCurrency(gastos.reduce(function(s,g){return s+(g.monto||0)},0))"></span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-base-200">
              <span class="font-semibold">Total Esperado</span>
              <span class="text-lg font-semibold" x-text="UI.formatCurrency(totalEsperado)"></span>
            </div>
            <div class="flex justify-between items-center">
              <span class="font-semibold">Total Contado (Real)</span>
              <span class="text-lg font-bold text-primary" x-text="UI.formatCurrency(totalReal)"></span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t-2 border-base-300">
              <span class="text-lg font-bold">Diferencia</span>
              <span class="text-xl font-bold" :class="diferencia >= 0 ? 'text-success' : 'text-error'"
                x-text="(diferencia >= 0 ? '+' : '') + UI.formatCurrency(diferencia)"></span>
            </div>
          </div>
        </div>

        <div class="flex justify-center gap-3">
          <button class="btn btn-ghost btn-lg gap-2" @click="imprimirTicket()">
            <i class="bi bi-printer"></i> Imprimir Ticket
          </button>
          <button class="btn btn-success btn-lg btn-spring gap-2 px-10" :disabled="guardando" @click="cerrarCorte()">
            <i class="bi bi-lock-fill" x-show="!guardando"></i>
            <span class="loading loading-spinner loading-sm" x-show="guardando"></span>
            <span x-text="guardando ? 'Cerrando...' : 'Cerrar Corte'"></span>
          </button>
        </div>
      </div>
    </template>

  </div>
</template>
