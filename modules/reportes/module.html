<div x-data="window.Reportes" x-init="init()" class="space-y-6">
  <!-- Loading Skeleton -->
  <div x-show="$store.loading.visible" x-cloak>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="sk-el" style="height:100px"></div>
      <div class="sk-el" style="height:100px"></div>
      <div class="sk-el" style="height:100px"></div>
      <div class="sk-el" style="height:100px"></div>
    </div>
    <div class="sk-el sk-chart"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
      <div class="sk-el sk-chart"></div>
      <div class="sk-el sk-chart"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
    <h2 class="text-xl font-bold">Reportes y Estadísticas</h2>
    <button class="btn btn-primary btn-sm btn-spring gap-2" @click="exportCSV()">
      <i class="bi bi-download"></i>
      Exportar CSV
    </button>
  </div>

  <!-- KPI Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="card-ds p-4 stagger-item" style="animation-delay:0s">
      <div class="kpi-label">Ventas Hoy</div>
      <div class="kpi-value text-primary mt-1" x-text="stats.ventasHoy">0</div>
      <div class="text-xs text-base-content/50 mt-1" x-text="UI.formatCurrency(stats.totalVentasHoy)"></div>
    </div>
    <div class="card-ds p-4 stagger-item" style="animation-delay:0.05s">
      <div class="kpi-label">Ventas Esta Semana</div>
      <div class="kpi-value text-secondary mt-1" x-text="stats.ventasSemana">0</div>
      <div class="text-xs text-base-content/50 mt-1" x-text="UI.formatCurrency(stats.totalVentasSemana)"></div>
    </div>
    <div class="card-ds p-4 stagger-item" style="animation-delay:0.1s">
      <div class="kpi-label">Ventas Este Mes</div>
      <div class="kpi-value text-accent mt-1" x-text="stats.ventasMes">0</div>
      <div class="text-xs text-base-content/50 mt-1" x-text="UI.formatCurrency(stats.totalVentasMes)"></div>
    </div>
    <div class="card-ds p-4 stagger-item" style="animation-delay:0.15s">
      <div class="kpi-label">Stock Bajo</div>
      <div class="kpi-value text-error mt-1" x-text="stats.stockBajo">0</div>
      <div class="text-xs text-base-content/50 mt-1">Productos con stock &lt; 5</div>
    </div>
  </div>

  <!-- Period Selector -->
  <div class="flex gap-2" role="tablist">
    <button class="btn btn-sm"
            :class="{ 'btn-active': periodo === 'hoy' }"
            @click="cambiarPeriodo('hoy')">Hoy</button>
    <button class="btn btn-sm"
            :class="{ 'btn-active': periodo === 'semana' }"
            @click="cambiarPeriodo('semana')">Esta Semana</button>
    <button class="btn btn-sm"
            :class="{ 'btn-active': periodo === 'mes' }"
            @click="cambiarPeriodo('mes')">Este Mes</button>
  </div>

  <!-- Charts Row 1 -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="card-ds p-4">
      <div class="kpi-label mb-3">Ventas por Día</div>
      <div class="relative" style="height:260px">
        <canvas id="chart-ventas-diarias"></canvas>
      </div>
    </div>
    <div class="card-ds p-4">
      <div class="kpi-label mb-3">Productos Más Vendidos</div>
      <div class="relative" style="height:260px">
        <canvas id="chart-productos-top"></canvas>
      </div>
    </div>
  </div>

  <!-- Chart Row 2 -->
  <div class="card-ds p-4 max-w-md mx-auto">
    <div class="kpi-label mb-3">Ventas por Método de Pago</div>
    <div class="relative" style="height:220px">
      <canvas id="chart-metodo-pago"></canvas>
    </div>
  </div>
</div>
