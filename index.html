<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#059669">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="AHA POS - Punto de venta offline-first para pequeños negocios">
  <script>if (location.protocol !== 'file:') { var l=document.createElement('link');l.rel='manifest';l.href='manifest.json';document.head.appendChild(l); }</script>
  <link rel="icon" type="image/svg+xml" href="data/defaults/placeholder.svg">
  <title>AHA POS</title>

  <!-- CSS Base -->
  <link href="dist/tailwind.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    html { font-family: 'Inter', system-ui, sans-serif; scroll-behavior: smooth; }
    [x-cloak] { display: none !important; }

    .sk-el { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
    .sk-heading { height: 1.5rem; width: 60%; margin-bottom: 1rem; }
    .sk-card { height: 8rem; width: 100%; margin-bottom: 0.75rem; }
    .sk-row { height: 3rem; width: 100%; margin-bottom: 0.5rem; }
    .sk-text { height: 0.875rem; width: 80%; margin-bottom: 0.5rem; }
    .sk-badge { height: 1.5rem; width: 4rem; border-radius: 9999px; }
    .sk-avatar { height: 2.5rem; width: 2.5rem; border-radius: 9999px; }
    .sk-chart { height: 260px; width: 100%; border-radius: 0.75rem; }
    .sk-progress { height: 0.75rem; width: 100%; border-radius: 9999px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .card-ds { background: #fff; border-radius: 16px; box-shadow: 0 6px 16px rgba(0,0,0,0.06); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-ds:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .dark .card-ds { background: #1e293b; }

    .input-ds { height: 44px; border-radius: 24px; padding: 0 16px; border: 1px solid #E7EBF2; background: #fff; font-size: 14px; color: #1F2937; outline: none; transition: all 0.2s ease; }
    .input-ds:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
    .input-ds::placeholder { color: #9CA3AF; }

    .btn-ds { height: 40px; border-radius: 9999px; padding: 0 24px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
    .btn-ds:active { transform: scale(0.97); }
    .btn-ds-primary { background: #059669; color: #fff; }
    .btn-ds-primary:hover { background: #047857; }
    .btn-ds-secondary { background: #78716c; color: #fff; }
    .btn-ds-secondary:hover { background: #57534e; }
    .btn-ds-ghost { background: #F3F4F6; color: #4B5563; }
    .btn-ds-ghost:hover { background: #E5E7EB; }
    .btn-ds-danger { background: rgba(239,68,68,0.1); color: #EF4444; }
    .btn-ds-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-ds-sm { height: 32px; padding: 0 16px; font-size: 12px; border-radius: 9999px; }
    .btn-spring { transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s ease, box-shadow 0.2s ease; }
    .btn-spring:hover { transform: scale(1.03); }
    .btn-spring:active { transform: scale(0.97); }

    .field-error { color: #EF4444; font-size: 12px; margin-top: 4px; display: none; }
    .input-error { border-color: #EF4444 !important; }

    .kpi-value { font-size: 24px; font-weight: 700; color: #1F2937; line-height: 1.2; }
    .kpi-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: #4B5563; }

    .fab { display: none; position: fixed; bottom: 76px; right: 16px; z-index: 40; width: 52px; height: 52px; border-radius: 16px; background: #059669; color: #fff; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(5,150,105,0.35); font-size: 22px; align-items: center; justify-content: center; transition: transform 0.2s; }
    .fab:active { transform: scale(0.92); }
    @media (max-width: 1023px) { .fab { display: flex; } }

    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: #fff; border-top: 1px solid #E5E7EB; padding: 6px 0 env(safe-area-inset-bottom, 8px); }
    .dark .bottom-nav { background: #1e293b; border-top-color: #334155; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; font-weight: 500; color: #6B7280; text-decoration: none; padding: 4px 8px; border-radius: 8px; transition: all 0.15s; background: none; border: none; cursor: pointer; font-family: inherit; }
    .bottom-nav-item.active { color: #059669; }
    .bottom-nav-item i { font-size: 20px; }
    @media (max-width: 1023px) { .bottom-nav { display: flex; justify-content: space-around; } }

    .empty-state { text-align: center; padding: 48px 24px; }
    .empty-state-icon { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .empty-state-icon i { font-size: 36px; }
    .empty-state-title { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .empty-state-desc { font-size: 13px; color: #6B7280; margin-bottom: 16px; }

    .toast-undo-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px; white-space: nowrap; }
    .offline-banner { animation: slideDown 0.3s ease-out; }

    .avatar-img { border-radius: 50%; object-fit: cover; display: block; flex-shrink: 0; }
    .avatar-placeholder { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; background: rgba(5,150,105,0.12); color: #059669; flex-shrink: 0; }

    #sidebar { transition: transform 0.25s ease; }
    @media (max-width: 1023px) { #sidebar { transform: translateX(-100%); position: fixed; z-index: 60; } }
    @media (max-width: 1023px) { #sidebar.open { transform: translateX(0); } }

    .sidebar-overlay { display: none; }
    @media (max-width: 1023px) { .sidebar-overlay.open { display: block; position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,0.3); } }

    .stagger-item { animation: fadeInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .module-enter { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

    .sp-search-input:focus { outline: none; box-shadow: none; }

    #main-content { min-height: calc(100vh - 64px); }
    @media (max-width: 1023px) { #main-content { padding-bottom: 72px; } }

    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast-container > * { pointer-events: auto; }
  </style>
</head>
<body x-cloak class="min-h-screen bg-base-200"><script>document.body.removeAttribute('x-cloak');</script>
  <div id="offline-banner" x-data x-show="!$store.ui.online" x-cloak class="offline-banner bg-warning text-warning-content text-center text-sm py-1.5 font-medium flex items-center justify-center gap-2">
    <i class="bi bi-wifi-off"></i>
    <span>Sin conexión — los datos se guardan localmente</span>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay" x-data x-show="$store.app.sidebarOpen" @click="$store.app.sidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-base-100 border-r border-base-200 z-60 flex flex-col"
         :class="{ 'open': $store.app.sidebarOpen }"
         x-data>
    <div class="p-4 border-b border-base-200 flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-primary-content font-bold text-lg">P</div>
      <div>
        <div class="font-bold text-base">AHA POS</div>
        <div class="text-xs text-base-content/50">Punto de Venta</div>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto p-3 space-y-1">
      <a href="#/ventas" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors hover:bg-base-200"
         :class="{ 'bg-primary/10 text-primary': $store.app.moduloActual === 'ventas' }"
         @click.prevent="window.appRouter?.navigate('ventas'); $store.app.sidebarOpen = false">
        <i class="bi bi-cart3 text-lg"></i> Ventas
        <span x-show="$store.badges.ventas" class="ml-auto badge badge-primary badge-sm" x-text="$store.badges.ventas"></span>
      </a>
      <a href="#/productos" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors hover:bg-base-200"
         :class="{ 'bg-primary/10 text-primary': $store.app.moduloActual === 'productos' }"
         @click.prevent="window.appRouter?.navigate('productos'); $store.app.sidebarOpen = false">
        <i class="bi bi-box-seam text-lg"></i> Productos
        <span x-show="$store.badges.productos" class="ml-auto badge badge-primary badge-sm" x-text="$store.badges.productos"></span>
      </a>
      <a href="#/corte" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors hover:bg-base-200"
         :class="{ 'bg-primary/10 text-primary': $store.app.moduloActual === 'corte' }"
         @click.prevent="window.appRouter?.navigate('corte'); $store.app.sidebarOpen = false">
        <i class="bi bi-cash-stack text-lg"></i> Corte de Caja
      </a>
      <a href="#/devoluciones" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors hover:bg-base-200"
         :class="{ 'bg-primary/10 text-primary': $store.app.moduloActual === 'devoluciones' }"
         @click.prevent="window.appRouter?.navigate('devoluciones'); $store.app.sidebarOpen = false">
        <i class="bi bi-arrow-return-left text-lg"></i> Devoluciones
      </a>
      <a href="#/reportes" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors hover:bg-base-200"
         :class="{ 'bg-primary/10 text-primary': $store.app.moduloActual === 'reportes' }"
         @click.prevent="window.appRouter?.navigate('reportes'); $store.app.sidebarOpen = false">
        <i class="bi bi-bar-chart-line text-lg"></i> Reportes
      </a>
    </nav>
    <div class="p-3 border-t border-base-200 text-xs text-base-content/40 text-center">
      AHA POS v1.0.0 &middot; Lite
    </div>
  </aside>

  <!-- Main Layout -->
  <div class="lg:ml-64 flex flex-col min-h-screen">
    <!-- Top Navbar -->
    <header class="sticky top-0 z-30 bg-base-100/80 backdrop-blur-md border-b border-base-200">
      <div class="flex items-center justify-between h-16 px-4">
        <div class="flex items-center gap-3">
          <button class="lg:hidden btn btn-ghost btn-sm btn-square" @click="$store.app.sidebarOpen = !$store.app.sidebarOpen">
            <i class="bi bi-list text-xl"></i>
          </button>
          <h1 class="text-lg font-bold truncate" x-text="$store.app.moduloActual ? window.MODULES?.[$store.app.moduloActual]?.titulo || $store.app.moduloActual : 'AHA POS'"></h1>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost btn-sm btn-square" @click="$store.theme.mode = $store.theme.mode === 'light' ? 'dark' : $store.theme.mode === 'dark' ? 'emerald' : $store.theme.mode === 'emerald' ? 'autumn' : 'light'" title="Cambiar tema">
            <template x-if="$store.theme.mode === 'light'"><i class="bi bi-sun-fill text-lg"></i></template>
            <template x-if="$store.theme.mode === 'dark'"><i class="bi bi-moon-fill text-lg"></i></template>
            <template x-if="$store.theme.mode === 'emerald'"><i class="bi bi-gem text-lg"></i></template>
            <template x-if="$store.theme.mode === 'autumn'"><i class="bi bi-flower1 text-lg"></i></template>
          </button>
          <button class="btn btn-ghost btn-sm btn-square" @click="window.Sync?.exportarBackup()" title="Sincronizar">
            <i class="bi bi-arrow-repeat text-lg"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 p-4 md:p-6">
      <div x-data="{}" x-init="console.log('main-content ready')">
        <div x-show="$store.loading.visible" x-cloak class="space-y-4">
          <div class="sk-el sk-heading"></div>
          <div class="sk-el sk-card"></div>
          <div class="sk-el sk-card"></div>
          <div class="sk-el sk-row"></div>
          <div class="sk-el sk-row"></div>
        </div>
        <div x-show="!$store.loading.visible" x-cloak id="module-content" class="module-enter"></div>
      </div>
    </main>
  </div>

  <!-- FAB (mobile) -->
  <button class="fab" id="fab-quick-add" x-data @click="window.dispatchEvent(new CustomEvent('fab-click'))">
    <i class="bi bi-plus-lg"></i>
  </button>

  <!-- Scroll-to-top -->
  <button x-data="{ show: false }" x-init="window.addEventListener('scroll', function() { show = window.scrollY > 400; })" x-show="show" x-cloak @click="window.scrollTo({ top: 0, behavior: 'smooth' })" class="fixed bottom-24 right-4 z-40 w-10 h-10 rounded-xl bg-base-100 border border-base-200 shadow-lg flex items-center justify-center text-base-content/50 hover:text-base-content transition-all cursor-pointer">
    <i class="bi bi-arrow-up"></i>
  </button>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item" :class="{ 'active': $store.app.moduloActual === 'ventas' }" @click="window.appRouter?.navigate('ventas')">
      <i class="bi bi-cart3"></i> Ventas
    </button>
    <button class="bottom-nav-item" :class="{ 'active': $store.app.moduloActual === 'productos' }" @click="window.appRouter?.navigate('productos')">
      <i class="bi bi-box-seam"></i> Productos
    </button>
    <button class="bottom-nav-item" :class="{ 'active': $store.app.moduloActual === 'corte' }" @click="window.appRouter?.navigate('corte')">
      <i class="bi bi-cash-stack"></i> Corte
    </button>
    <button class="bottom-nav-item" :class="{ 'active': $store.app.moduloActual === 'devoluciones' }" @click="window.appRouter?.navigate('devoluciones')">
      <i class="bi bi-arrow-return-left"></i> Devol.
    </button>
    <button class="bottom-nav-item" :class="{ 'active': $store.app.moduloActual === 'reportes' }" @click="window.appRouter?.navigate('reportes')">
      <i class="bi bi-bar-chart-line"></i> Reportes
    </button>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Search Palette Teleport Target -->
  <div id="search-palette-target"></div>

  <!-- ============ SCRIPTS ============ -->

  <!-- alpine:init ANTES de Alpine CDN - patrón oficial para stores -->
  <script>
    document.addEventListener('alpine:init', function () {
      Alpine.store('app', Object.assign({
        moduloActual: '',
        loading: false,
        error: null,
        sidebarOpen: false,
        modulos: [],
        offline: !navigator.onLine
      }, Alpine.store('app') || {}));
      Alpine.store('theme', Object.assign({
        mode: localStorage.getItem('aha-pos-theme') || 'light'
      }, Alpine.store('theme') || {}));
      Alpine.store('ui', Object.assign({
        online: navigator.onLine,
        sidebarOpen: false,
        searchOpen: false
      }, Alpine.store('ui') || {}));
      Alpine.store('loading', Object.assign({
        phase: 'loading',
        visible: true
      }, Alpine.store('loading') || {}));
      Alpine.store('badges', Object.assign({}, Alpine.store('badges') || {}));
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.6/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Core -->
  <script src="core/env.js"></script>
  <script src="core/db.js"></script>
  <script src="core/crypto.js"></script>
  <script src="core/ui.js"></script>
  <script src="core/theme.js"></script>
  <script src="core/app.js"></script>
  <script src="core/search-palette.js"></script>
  <script src="core/file-store.js"></script>
  <script src="core/sync.js"></script>
  <script src="core/network.js"></script>
  <script src="project.config.js"></script>
  <script src="core/license.js"></script>

  <!-- Módulos -->
  <script src="modules/ventas/module.js"></script>
  <script src="modules/productos/module.js"></script>
  <script src="modules/corte/module.js"></script>
  <script src="modules/devoluciones/module.js"></script>
  <script src="modules/reportes/module.js"></script>

  <!-- Main -->
  <script src="core/main.js"></script>

  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          console.log('SW registrado:', reg.scope);
        }).catch(function(err) {
          console.log('SW error:', err);
        });
      });
    }
  </script>

  <!-- Global Keyboard Shortcuts -->
  <script>
    document.addEventListener('keydown', function (e) {
      var t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
      if ((e.ctrlKey || e.metaKey) && (e.key === 'n' || e.key === 'N')) {
        e.preventDefault();
        window.dispatchEvent(new CustomEvent('fab-click'));
        return;
      }
      var MODS = { F1: 'ventas', F2: 'productos', F3: 'corte', F4: 'devoluciones', F5: 'reportes' };
      if (MODS[e.key] && !e.ctrlKey && !e.altKey && !e.metaKey) {
        e.preventDefault();
        if (window.appRouter) window.appRouter.navigate(MODS[e.key]);
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (window.toggleSearch) window.toggleSearch();
        return;
      }
      if (e.key === 'Escape') {
        var s = Alpine.store('app');
        if (s && s.sidebarOpen) { s.sidebarOpen = false; e.preventDefault(); }
      }
    });
  </script>
</body>
</html>
